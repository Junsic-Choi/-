<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정삭 장비 주간 계획 취합 시스템</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css?v=2">
    <style>
        /* CRITICAL STICKY RULES - INLINE TO BEAT BROWSER CACHE */
        .table-scroll-wrapper {
            width: 100%;
            /* NO overflow properties here, so the whole page scrolls */
            overflow: visible !important;
        }

        thead th {
            position: -webkit-sticky !important;
            position: sticky !important;
            top: 0 !important;
            z-index: 9999 !important;
            background-color: #F8FAFC !important;
            background-clip: padding-box !important;
            box-shadow: inset 0 -1px 0 var(--border-color), 0 2px 4px -2px rgba(0, 0, 0, 0.15) !important;
        }

        /* Phase 18: Holiday UI Styles */
        .holiday-section {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 5px solid #ff4d4f;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow-sm);
        }

        .holiday-label {
            font-weight: 700;
            color: #333;
            font-size: 0.95rem;
        }

        .holiday-toggles {
            display: flex;
            gap: 0.5rem;
        }

        .holiday-btn {
            padding: 0.4rem 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f5f5f5;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .holiday-btn.active {
            background: #ff4d4f;
            color: #fff;
            border-color: #ff4d4f;
        }

        .holiday-btn:hover {
            background: #e0e0e0;
        }

        .holiday-btn.active:hover {
            background: #ff7875;
        }

        .holiday-column {
            background-color: #fcebeb !important;
        }

        .holiday-column input {
            background-color: #f5f5f5 !important;
            color: #999 !important;
            border-color: #ddd !important;
            cursor: not-allowed;
        }

        .holiday-cell-text {
            color: #ff4d4f;
            font-weight: 700;
            font-size: 0.8rem;
            margin-top: 2px;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <header>
            <h1>주간 정삭 계획 현황</h1>
            <div class="week-picker-container"
                style="position: relative; display: inline-flex; align-items: center; gap: 10px;">
                <label>기간 선택:</label>
                <div class="week-picker-wrapper" style="position: relative;">
                    <!-- Custom text display -->
                    <div id="weekDisplay" class="week-display"
                        style="padding: 0.6rem 1rem; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-main); font-weight: 500; cursor: pointer;">
                        로딩중...
                    </div>
                    <!-- Invisible native week input -->
                    <input type="date" id="weekPicker" class="week-picker">
                </div>
                <!-- Moved Manager Filter here -->
                <div class="filter-group" style="margin-left: 10px;">
                    <label for="managerFilter" style="font-weight: 600; font-size: 0.9rem;">👤 담당자:</label>
                    <select id="managerFilter"
                        style="padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border-color); cursor: pointer; font-size: 0.9rem;">
                        <option value="">전체 항목</option>
                    </select>
                </div>
            </div>
    </div>
    <p>각 장비별 계획을 입력하고 [통합 화면]에서 전체 현황을 확인하세요.</p>
    </header>

    <nav class="tabs-container">
        <ul id="equipmentTabs" class="tabs">
            <!-- Tabs will be injected here dynamically -->
        </ul>
    </nav>

    <main>
        <!-- Content for specific equipment -->
        <section id="planEditor" class="tab-content active">
            <div class="editor-header">
                <h2 id="currentEquipmentTitle">장비명 로딩중...</h2>
            </div>

            <!-- Phase 18: Holiday Toggle UI -->
            <div class="holiday-section">
                <div class="holiday-label">📅 장비 휴무일 설정 (휴무) :</div>
                <div class="holiday-toggles" id="holidayToggles">
                    <button class="holiday-btn" data-day="mon">월</button>
                    <button class="holiday-btn" data-day="tue">화</button>
                    <button class="holiday-btn" data-day="wed">수</button>
                    <button class="holiday-btn" data-day="thu">목</button>
                    <button class="holiday-btn" data-day="fri">금</button>
                    <button class="holiday-btn" data-day="sat">토</button>
                    <button class="holiday-btn" data-day="sun">일</button>
                </div>
                <div style="font-size: 0.85rem; color: #666; margin-left: auto;">* 휴무로 선택된 요일은 계획 입력이 차단됩니다.</div>
            </div>

            <div class="table-card">
                <div class="table-scroll-wrapper">
                    <table id="planTable">
                        <thead>
                            <tr>
                                <th>NO</th>
                                <th>담당자</th>
                                <th>기종</th>
                                <th>품명</th>
                                <th>품번</th>
                                <th id="thSun">일</th>
                                <th id="thMon">월</th>
                                <th id="thTue">화</th>
                                <th id="thWed">수</th>
                                <th id="thThu">목</th>
                                <th id="thFri">금</th>
                                <th id="thSat">토</th>
                                <th>작업</th>
                            </tr>
                        </thead>
                        <tbody id="planTableBody">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" id="addRowBtn">+ 행 추가</button>
                <button class="btn btn-primary" id="saveBtn">✓ 계획 저장하기</button>
            </div>
        </section>

        <!-- Content for Consolidated View -->
        <section id="consolidatedView" class="tab-content">
            <div class="editor-header">
                <h2>통합 화면 : 전체 주간 정삭 계획 및 실적</h2>
                <div class="filter-group">
                    <button class="btn btn-primary" id="saveActualsBtn">💾 실적 저장</button>
                    <button class="btn btn-success" id="exportExcelBtn">📥 엑셀 추출</button>
                    <button class="btn btn-secondary" id="refreshConsolidatedBtn">🔄 새로고침</button>
                </div>
            </div>
            <div class="table-card">
                <div class="table-scroll-wrapper">
                    <table id="consolidatedTable">
                        <thead>
                            <tr>
                                <th>장비 (W/C)</th>
                                <th>담당자</th>
                                <th>기종</th>
                                <th>품명</th>
                                <th>품번</th>
                                <th id="thType">구분</th>
                                <th id="thConsSun">일</th>
                                <th id="thConsMon">월</th>
                                <th id="thConsTue">화</th>
                                <th id="thConsWed">수</th>
                                <th id="thConsThu">목</th>
                                <th id="thConsFri">금</th>
                                <th id="thConsSat">토</th>
                            </tr>
                        </thead>
                        <tbody id="consolidatedTableBody">
                            <!-- Rows injected here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">저장되었습니다.</div>
    </div>

    <!-- SheetJS for Excel Export (Local Fallback for Intranet) -->
    <script src="/js/xlsx.full.min.js"></script>
    <script type="module" src="/src/app.js"></script>
</body>

</html>
